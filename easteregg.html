<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wake Up, Neo.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Zilla+Slab:wght@400;600;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000;
            color: #fff;
            font-family: 'Zilla Slab', serif;
            text-align: center;
        }

        h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: clamp(2rem, 8vw, 4rem);
            color: #e1e812;
            margin-bottom: 2rem;
            text-transform: uppercase;
            text-shadow: 4px 4px 0px #e35e8e;
            padding: 0 1rem;
        }

        p {
            font-size: clamp(1rem, 4vw, 1.5rem);
            max-width: 90%;
            width: 600px;
            line-height: 1.6;
            margin-bottom: 2rem;
            padding: 0 1rem;
        }

        .btn {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            color: #000;
            background-color: #fff;
            text-decoration: none;
            border: 4px solid #fff;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: #000;
            color: #fff;
            box-shadow: 8px 8px 0px #e1e812;
        }
    </style>
</head>

<body>
    <h1>Chega de Doomscrolling.</h1>
    <p>"O fracasso que você vê refletido na tela do seu celular é apenas o reflexo do tempo que você perdeu nela em vez
        de moldar o mundo à sua volta com as próprias mãos."</p>
    <p>Vai focar nos teus projetos.</p>
    <a href="index.html" class="btn">Voltar para a Realidade</a>
</body>

</html>

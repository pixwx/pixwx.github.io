name: Update Steam Profile Status

on:
  schedule:
    - cron: '0 */4 * * *' # Executa a cada 4 horas
  workflow_dispatch: # Permite execução manual pelo Github Actions

jobs:
  update-steam:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm install xml2js

    - name: Run Fetch Script
      run: node steam-fetch.js

    - name: Run Goodreads Fetch Script
      run: node goodreads-fetch.js

    - name: Run Substack Fetch Script
      run: node substack-fetch.js

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add steam-data.json steam-data.js goodreads-data.json goodreads-data.js substack-data.json substack-data.js
        # Only commit if there are changes
        git diff --quiet && git diff --staged --quiet || git commit -m "chore: Automate profile data updates (Steam & Goodreads & Substack)"
        git push
